<head>
    <title>GameLauncher-Settings</title>
    <link rel="icon" href="data/gamelauncher_icon.ico" type="image/x-icon">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="nav">
        <a href="index.html">🏠 Home</a>
        <a href="download-visual.html">👁️ Visual</a>
        <a href="download-professional.html">💼 Professional</a>
        <a href="settings.html">⚙️ Settings</a>
    </div>
    <div class="container">
    <h2>⚙️ Settings</h2>

    <div class="card">
        <h3>🌓 ธีมการแสดงผล</h3>
        <button onclick="setTheme('dark')">โหมดมืด (Dark)</button>
        <button onclick="setTheme('light')">โหมดสว่าง (Light)</button>
    </div>

    <div class="card">
        <h3>🎨 สีเน้น (Accent Color)</h3>
        <input type="color" id="colorPicker" onchange="changeColor()">
    </div>

    <div class="card">
        <h3>⚙️ การตั้งค่าอื่นๆ</h3>
        <button onclick="resetToDefault()" style="padding:10px 20px; background:#b32424; color:white; border:none; border-radius:5px; cursor:pointer;">
            🔄 คืนค่าเริ่มต้น (Reset Default)
        </button>
    </div>
    </div>

    <script>
        function resetToDefault() {
            // ล้างข้อมูลที่เคยเซฟไว้
            localStorage.removeItem('theme');
            localStorage.removeItem('accent');
            
            // รีเฟรชหน้าเว็บ เพื่อโหลดค่าเริ่มต้นจาก CSS
            location.reload();
        }
        
        // สลับธีม มืด/สว่าง
        function setTheme(mode) {
            if(mode === 'light') {
                document.body.classList.add('light-theme');
            } else {
                document.body.classList.remove('light-theme');
            }
            localStorage.setItem('theme', mode);
        }

        // เปลี่ยนสี Accent
        function changeColor() {
            const color = document.getElementById('colorPicker').value;
            document.documentElement.style.setProperty('--accent-color', color);
            localStorage.setItem('accent', color);
        }

        // โหลดค่าที่เซฟไว้ตอนเปิดเว็บ
        window.onload = () => {
            const savedTheme = localStorage.getItem('theme');
            const savedColor = localStorage.getItem('accent');
            
            if(savedTheme) setTheme(savedTheme);
            if(savedColor) {
                document.documentElement.style.setProperty('--accent-color', savedColor);
                document.getElementById('colorPicker').value = savedColor;
            }
        }
    </script>
</body>
