<head>
    <title>GameLauncher-Download</title>
    <link rel="icon" href="data/gamelauncher_icon.ico" type="image/x-icon">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="nav">
        <a href="index.html">🏠 Home</a>
        <a href="download.html" class="active">🚀 Download</a>
        <a href="settings.html">⚙️ Settings</a>
    </div>
    <div class="container">
        <h2>📂 Download Versions</h2>
        <table>
            <thead><tr><th>Version</th><th>File</th><th>Action</th></tr></thead>
            <tbody id="dlTable"></tbody>
        </table>
    </div>
    <script>
        fetch('GameLauncher-download/versions.json')
            .then(res => res.json())
            .then(data => {
                data.forEach(item => {
                    document.getElementById('dlTable').innerHTML += `<tr>
                        <td>${item.version}</td><td>${item.file}</td>
                        <td><a href="GameLauncher-download/${item.file}" class="btn-dl" download>Download</a></td>
                    </tr>`;
                });
            });
    </script>
    <script>
        // โหลดค่าธีมที่เลือกไว้ทันทีที่เปิดหน้าเว็บ
        window.onload = () => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light-theme');
            }
            
            const savedColor = localStorage.getItem('accent');
            if (savedColor) {
                document.documentElement.style.setProperty('--accent-color', savedColor);
            }
        };
    </script>
</body>
